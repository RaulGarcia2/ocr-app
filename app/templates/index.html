<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>Lector OCR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 2rem;
            max-width: 700px;
            width: 100%;
        }
        h1 { margin-bottom: 1.5rem; font-size: 1.5rem; color: #333; }
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            margin-bottom: 1rem;
        }
        .upload-area:hover { border-color: #666; }
        .upload-area.dragover { border-color: #2196F3; background: #e3f2fd; }
        .upload-area input { display: none; }
        .upload-label { color: #666; cursor: pointer; }

        #image-container {
            display: none;
            margin-bottom: 1rem;
        }
        #image-container img { max-width: 100%; }

        .toolbar {
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .toolbar button {
            padding: 0.4rem 0.9rem;
            background: #e0e0e0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.15s;
        }
        .toolbar button:hover { background: #bdbdbd; }
        .toolbar button.active {
            background: #2196F3;
            color: #fff;
        }
        .toolbar .sep {
            width: 1px;
            background: #ccc;
            margin: 0 0.25rem;
        }

        #ocr-btn {
            width: 100%;
            padding: 0.75rem;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            display: none;
        }
        #ocr-btn:hover { background: #1976D2; }
        #ocr-btn:disabled {
            background: #90CAF9;
            cursor: not-allowed;
        }

        #result-area {
            margin-top: 1rem;
            display: none;
        }
        #result-area label { font-weight: 600; color: #333; display: block; margin-bottom: 0.5rem; }
        #result-area textarea {
            width: 100%;
            height: 200px;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            resize: vertical;
            background: #fafafa;
        }
        .error {
            margin-top: 1rem;
            padding: 0.75rem;
            background: #ffebee;
            color: #c62828;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Lector OCR</h1>

        <div class="upload-area" id="drop-area">
            <input type="file" id="file-input" accept="image/*">
            <div class="upload-label">Haz clic o arrastra una imagen aquí</div>
        </div>

        <div id="image-container">
            <img id="image" alt="Vista previa">
        </div>

        <div class="toolbar" id="toolbar">
            <button id="mode-crop" class="active" onclick="setMode('crop')" title="Modo recorte">✂ Recortar</button>
            <button id="mode-move" onclick="setMode('move')" title="Modo mover">✋ Mover</button>
            <span class="sep"></span>
            <button onclick="zoomOut()" title="Alejar">–</button>
            <button onclick="zoomIn()" title="Acercar">+</button>
        </div>

        <button id="ocr-btn" onclick="runOcr()">Leer OCR</button>

        <div id="result-area">
            <label for="ocr-result">Texto extraído:</label>
            <textarea id="ocr-result" readonly></textarea>
        </div>

        <div class="error" id="error-msg"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    <script>
        const fileInput = document.getElementById('file-input');
        const dropArea = document.getElementById('drop-area');
        const imageContainer = document.getElementById('image-container');
        const image = document.getElementById('image');
        const toolbar = document.getElementById('toolbar');
        const ocrBtn = document.getElementById('ocr-btn');
        const resultArea = document.getElementById('result-area');
        const resultText = document.getElementById('ocr-result');
        const errorMsg = document.getElementById('error-msg');
        let cropper = null;

        function destroyCropper() {
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
        }

        function showFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                destroyCropper();
                image.src = e.target.result;
                imageContainer.style.display = 'block';
                toolbar.style.display = 'flex';
                ocrBtn.style.display = 'block';
                resultArea.style.display = 'none';
                errorMsg.style.display = 'none';
                cropper = new Cropper(image, {
                    viewMode: 1,
                    dragMode: 'crop',
                    autoCropArea: 1,
                    responsive: true,
                    restore: true,
                    guides: true,
                    center: true,
                    highlight: false,
                    background: false,
                });
                setMode('crop');
            };
            reader.readAsDataURL(file);
        }

        function setMode(mode) {
            if (!cropper) return;
            cropper.setDragMode(mode);
            document.getElementById('mode-crop').classList.toggle('active', mode === 'crop');
            document.getElementById('mode-move').classList.toggle('active', mode === 'move');
        }

        function zoomIn() {
            if (cropper) cropper.zoom(0.1);
        }

        function zoomOut() {
            if (cropper) cropper.zoom(-0.1);
        }

        dropArea.addEventListener('click', () => fileInput.click());

        dropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropArea.classList.add('dragover');
        });

        dropArea.addEventListener('dragleave', () => {
            dropArea.classList.remove('dragover');
        });

        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                showFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                showFile(fileInput.files[0]);
            }
        });

        async function runOcr() {
            if (!cropper) return;

            ocrBtn.disabled = true;
            ocrBtn.textContent = 'Procesando...';
            errorMsg.style.display = 'none';

            const canvas = cropper.getCroppedCanvas();
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('image', blob, 'crop.png');

                try {
                    const response = await fetch('/ocr', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();

                    if (data.error) {
                        errorMsg.textContent = data.error;
                        errorMsg.style.display = 'block';
                        resultArea.style.display = 'none';
                    } else {
                        resultText.value = data.text;
                        resultArea.style.display = 'block';
                        errorMsg.style.display = 'none';
                    }
                } catch (err) {
                    errorMsg.textContent = 'Error de conexión con el servidor';
                    errorMsg.style.display = 'block';
                    resultArea.style.display = 'none';
                } finally {
                    ocrBtn.disabled = false;
                    ocrBtn.textContent = 'Leer OCR';
                }
            });
        }
    </script>
</body>
</html>
